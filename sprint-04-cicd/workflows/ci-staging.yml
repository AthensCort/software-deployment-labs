# CI/CD — STAGING
# Se ejecuta al mergear a la rama staging.
# Más estricto que DEV: incluye lint y el build debe pasar antes de migrar.

name: CI/CD — STAGING

on:
  push:
    branches: [staging]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  # ── 1. Tests + Lint (en paralelo) ───────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  # ── 2. Migraciones ───────────────────────────────────────────────────────────
  migrate:
    name: Aplicar migraciones → STAGING
    runs-on: ubuntu-latest
    needs: [test, lint]     # ambos deben pasar
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Aplicar migraciones
        run: supabase db push --db-url "${{ secrets.STAGING_DB_URL }}"

  # ── 3. Deploy ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy → STAGING
    runs-on: ubuntu-latest
    needs: migrate
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm install -g vercel

      - name: Pull configuración de Vercel
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_ENV_NAME: staging
          # Path B/C — descomentar si aplica
          # VITE_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          # VITE_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          # VITE_ENV_NAME: staging

      - name: Deploy (preview — rama staging)
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── 4. Notificación de resultado ─────────────────────────────────────────────
  notify:
    name: Resultado
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Resumen
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deploy a STAGING exitoso — ${{ github.sha }}"
          else
            echo "❌ Deploy a STAGING falló — revisar los logs del job anterior"
            exit 1
          fi
